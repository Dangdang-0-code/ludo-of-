<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ludo Of Facts - Class 7A5</title>
    <style>
        :root { --dp: #9292ff; --bg: #f3f0ff; --p: #bdb2ff; --gold: #ffd700; }
        body { margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* MÀN HÌNH LOADING - FIX LỖI CHE MẤT MÈO */
        #loading-screen { 
            position: fixed; inset: 0; 
            background: #fce4ec url('image_d98ded.jpg') no-repeat center; 
            background-size: contain; /* Đổi thành contain để thấy trọn vẹn bức tranh */
            z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end; 
            padding-bottom: 5vh;
        }

        /* Thanh progress bar tùy chỉnh theo màu của ảnh */
        .progress-bar { 
            width: 320px; height: 18px; 
            background: rgba(255,255,255,0.4); 
            border-radius: 20px; overflow: hidden; 
            border: 3px solid #5b87c5; 
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(91, 135, 197, 0.3);
        }
        #fill { width: 0%; height: 100%; background: linear-gradient(90deg, #9a73ef, #ff85c0); transition: width 2s linear; }
        
        /* Nút Enter Game đồng bộ với thiết kế ảnh */
        #btn-start { 
            display: none; padding: 14px 55px; border-radius: 40px; 
            background: #4a90e2; color: white; border: 4px solid #357abd; 
            cursor: pointer; font-weight: bold; font-size: 22px; 
            box-shadow: 0 6px 0 #2c5a94; transition: 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #btn-start:hover { background: #357abd; }
        #btn-start:active { transform: translateY(4px); box-shadow: 0 2px 0 #2c5a94; }

        /* PHẦN GAME CHÍNH */
        #game-content { display: none; flex-direction: column; align-items: center; }
        #game-box { 
            position: relative; width: 80vh; height: 80vh; 
            background: white url('board.png') no-repeat center; 
            background-size: 100% 100%; border-radius: 15px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); border: 5px solid white; 
        }
        
        .pawn { width: 45px; height: 45px; position: absolute; z-index: 100; cursor: pointer; transform: translate(-50%, -50%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .pawn.active { filter: drop-shadow(0 0 8px var(--dp)); animation: shake 0.6s infinite; }
        .pawn.targetable { filter: drop-shadow(0 0 15px red); animation: pulseRed 0.5s infinite; z-index: 200; border: 3px solid red; border-radius: 50%; }
        .pawn.shielded { filter: drop-shadow(0 0 12px var(--gold)); border: 3px solid var(--gold); border-radius: 50%; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .card { background: white; width: 400px; padding: 35px; border-radius: 30px; border: 6px solid var(--p); text-align: center; }
        
        .corner-btn { position: fixed; top: 20px; width: 52px; height: 52px; background: white; border: 3px solid var(--p); border-radius: 50%; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 6000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #help-btn { right: 20px; }
        #settings-btn { left: 20px; }

        .item { width: 40px; height: 40px; position: absolute; z-index: 50; transform: translate(-50%, -50%); background-size: contain; background-repeat: no-repeat; animation: itemPop 0.8s infinite alternate; }
        #items-layer { position: absolute; inset: 0; z-index: 60; pointer-events: none; }
        
        @keyframes pulseRed { from { transform: translate(-50%, -50%) scale(1); } to { transform: translate(-50%, -50%) scale(1.2); } }
        @keyframes shake { 0%, 100% { transform: translate(-50%, -50%) rotate(0); } 25% { transform: translate(-50%, -50%) rotate(5deg); } 75% { transform: translate(-50%, -50%) rotate(-5deg); } }
        @keyframes itemPop { from { transform: translate(-50%, -50%) scale(0.95); } to { transform: translate(-50%, -50%) scale(1.1); } }
    </style> 
</head>
<body>

    <div id="loading-screen">
        <div class="progress-bar"><div id="fill"></div></div>
        <button id="btn-start" onclick="enterGame()">ENTER GAME</button>
    </div>

    <button id="settings-btn" class="corner-btn" onclick="openModal('settings-modal')">⚙️</button>
    <button id="help-btn" class="corner-btn" onclick="openModal('help-modal')">?</button>

    <div id="game-content">
        <div id="turn-info" style="font-size: 24px; font-weight: bold; color: var(--dp); background: white; padding: 12px 45px; border-radius: 50px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            Lượt: <span id="turn-display">Luca</span>
        </div>
        <div id="game-box"><div id="items-layer"></div></div>
        <div style="display: flex; align-items: center; gap: 30px; margin-top: 20px; background: white; padding: 15px 50px; border-radius: 60px; box-shadow: 0 5px 20px rgba(0,0,0,0.1);">
            <div id="dice-res" style="font-size: 38px; font-weight: bold;">🎲 0</div>
            <button id="roll-btn" style="padding: 15px 40px; background: var(--dp); color: white; border: none; border-radius: 35px; cursor: pointer; font-weight: bold; font-size: 18px;" onclick="roll()">ĐỔ XÚC XẮC</button>
        </div>
    </div>

    <div id="help-modal" class="modal" onclick="closeModal('help-modal')">
        <div class="card" onclick="event.stopPropagation()">
            <h2 style="color: var(--dp)">📜 HƯỚNG DẪN</h2>
            <div style="text-align: left; margin: 20px 0; font-size: 16px; line-height: 1.8;">
                <p>💡 <b>Kiến thức:</b> Xuất hiện khi nhặt vật phẩm hoặc về đích.</p>
                <p>🐟 <b>Cá:</b> Cho phép bạn chọn 1 quân đối thủ để đá về chuồng.</p>
                <p>🧀 <b>Phô mai:</b> Kích hoạt khiên bảo vệ trong 2 lượt tới.</p>
            </div>
            <button onclick="closeModal('help-modal')" style="background: var(--dp); color: white; border: none; padding: 12px 40px; border-radius: 20px; cursor: pointer; font-weight: bold;">ĐÃ HIỂU</button>
        </div>
    </div>

    <div id="settings-modal" class="modal" onclick="closeModal('settings-modal')">
        <div class="card" onclick="event.stopPropagation()">
            <h2 style="color: var(--dp)">⚙️ CÀI ĐẶT</h2>
            <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0; padding: 15px; background: #f8f9fa; border-radius: 20px;">
                <span style="font-weight: bold;">Âm nhạc</span>
                <button id="music-toggle" onclick="toggleMusic()" style="border: none; background: #ff5252; color: white; padding: 10px 25px; border-radius: 12px; cursor: pointer; font-weight: bold;">TẮT</button>
            </div>
            <button onclick="copyLink()" style="width: 100%; padding: 15px; border: none; background: var(--p); color: white; border-radius: 20px; cursor: pointer; font-weight: bold; margin-bottom: 25px;">SAO CHÉP LINK GAME</button>
            
            <div style="border-top: 2px solid #eee; padding-top: 20px;">
                <p style="font-size: 13px; color: #888; margin: 0;">NHÓM THỰC HIỆN:</p>
                <p style="font-size: 22px; color: var(--dp); font-weight: 900; margin: 5px 0;">SANG - GIANG - ĐAN</p>
                <p style="font-size: 12px; color: #aaa;">Ludo Of Facts - 7A5</p>
            </div>
            <button onclick="closeModal('settings-modal')" style="margin-top: 15px; background: #eee; border: none; padding: 10px 30px; border-radius: 15px; cursor: pointer;">ĐÓNG</button>
        </div>
    </div>

    <div id="fact-modal" class="modal">
        <div class="card">
            <h3 style="color: var(--dp)">💡 BẠN CÓ BIẾT?</h3>
            <p id="fact-txt" style="font-size: 18px; line-height: 1.6; min-height: 70px; margin: 25px 0; font-weight: 500;"></p>
            <div id="timer-display" style="font-size: 40px; font-weight: 900; color: var(--dp); margin-bottom: 15px;">5</div>
            <button id="ok-btn" onclick="closeFact()" style="padding: 15px 60px; border: none; border-radius: 30px; background: #bbb; color: white; cursor: pointer; font-weight: bold;">ĐANG ĐỌC...</button>
        </div>
    </div>

    <audio id="bgMusic" loop src="pixel-drift-pecan-pie-main-version-41106-02-09.mp3"></audio>

    <script>
        const allFacts = ["Sứa bất tử có thể đảo ngược chu kỳ sống.","Bọ hung kéo vật nặng gấp 1.141 lần cơ thể.","Rùa biển có thể thở qua hậu môn.","Bạch tuộc có 3 tim và 9 bộ não.","Tôm tít đấm nhanh đến mức tạo ra nhiệt.","Voi không thể nhảy.","Chim ruồi có thể bay lùi.","Mèo ngủ 70% cuộc đời.","Sao Kim quay ngược chiều kim đồng hồ.","Mật ong không hỏng.","Ốc sên ngủ 3 năm.","Tiếng vịt không có tiếng vang.","Mắt đà điểu to hơn não.","Hươu cao cổ không có dây thanh quản.","Lưỡi cá voi xanh nặng bằng một con voi.","Cá mập già hơn cây cối.","Kiến không bao giờ ngủ.","Hà mã mồ hôi màu đỏ.","Kanguru không thể đi lùi.","Lợn không thể nhìn lên trời.","Gấu Bắc Cực da màu đen.","Hổ có da vằn.","Mây nặng 500 tấn.","Vàng ăn được.","Âm thanh dưới nước nhanh gấp 4.","Sao Kim ngày dài hơn năm.","Koala có vân tay như người.","Xương đùi cứng hơn bê tông.","Trẻ em nhiều xương hơn người lớn.","Bộ não hoạt động mạnh hơn khi ngủ.","Răng người cứng ngang đá.","Bướm nếm bằng chân.","Sao Thổ mưa kim cương.","Kiến nhấc vật nặng gấp 50 lần.","Mỗi người có dấu lưỡi riêng.","Cá vàng nhớ được vài tháng.","Lạc đà có 3 mí mắt.","Chuột biết cười.","Bọ ngựa tai ở giữa chân.","Voi gọi nhau bằng hạ âm.","Muỗi thích nhóm máu O.","Người cao thêm vào buổi sáng.","Tim đập 100.000 lần/ngày.","Sét đánh 100 lần/giây.","Kim cương cứng nhất.","Cá ngựa đực đẻ con.","Bạch tuộc phun mực.","Gấu trúc ăn 12 tiếng/ngày.","Chim ruồi tim đập 1200 lần/phút.","Mèo có 32 cơ ở mỗi tai."];
        
        let factPool = [...allFacts];
        const paths = [
            [{t:6, l:44.5}, {t:13, l:44.5}, {t:20, l:44.5}, {t:27, l:44.5}, {t:34, l:44.5}, {t:41, l:38}, {t:41, l:31}, {t:41, l:24}, {t:41, l:17}, {t:41, l:10}],
            [{t:44.5, l:94}, {t:44.5, l:87}, {t:44.5, l:80}, {t:44.5, l:73}, {t:44.5, l:66}, {t:38, l:59}, {t:31, l:59}, {t:24, l:59}, {t:17, l:59}, {t:10, l:59}],
            [{t:55.5, l:6}, {t:55.5, l:13}, {t:55.5, l:20}, {t:55.5, l:27}, {t:55.5, l:34}, {t:62, l:41}, {t:69, l:41}, {t:76, l:41}, {t:83, l:41}, {t:90, l:41}],
            [{t:94, l:55.5}, {t:87, l:55.5}, {t:80, l:55.5}, {t:73, l:55.5}, {t:66, l:55.5}, {t:59, l:62}, {t:59, l:69}, {t:59, l:76}, {t:59, l:83}, {t:59, l:90}]
        ];
        const homePositions = [
            {t:[17,17,28,28], l:[17,28,17,28]}, {t:[17,17,28,28], l:[72,83,72,83]}, 
            {t:[72,72,83,83], l:[17,28,17,28]}, {t:[72,72,83,83], l:[72,83,72,83]}
        ];
        
        let turn = 0, currentDice = 0, itemsOnBoard = [], isSelectingTarget = false, factCallback = null;
        const teamNames = ["Luca", "Meco", "Nero", "Gumo"];

        window.onload = () => {
            document.getElementById('fill').style.width = '100%';
            setTimeout(() => { document.getElementById('btn-start').style.display = 'block'; }, 2000); 
        };

        function enterGame() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('game-content').style.display = 'flex';
            init();
        }

        function init() {
            const box = document.getElementById('game-box');
            box.querySelectorAll('.pawn').forEach(p => p.remove());
            const imgs = ['meo_den.png', 'meo_xiem.png', 'meo_vang.png', 'meo_trang.png'];
            imgs.forEach((img, tIdx) => {
                for(let i=0; i<4; i++) {
                    const m = document.createElement('img');
                    m.src = img; m.className = 'pawn';
                    m.dataset.team = tIdx; m.dataset.id = i; m.dataset.step = -1; m.dataset.shield = 0;
                    resetToHome(m);
                    m.onclick = () => handlePawnClick(m);
                    box.appendChild(m);
                }
            });
            spawnItems();
            updatePawnStatus();
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function roll() {
            if(currentDice > 0 || isSelectingTarget) return;
            currentDice = Math.floor(Math.random()*6)+1;
            document.getElementById('dice-res').innerText = "🎲 " + currentDice;
            document.getElementById('roll-btn').disabled = true;
        }

        function handlePawnClick(m) {
            if (isSelectingTarget) {
                if (parseInt(m.dataset.team) !== turn && parseInt(m.dataset.step) !== -1 && parseInt(m.dataset.shield) === 0) {
                    resetToHome(m);
                    document.querySelectorAll('.pawn').forEach(p => p.classList.remove('targetable'));
                    isSelectingTarget = false;
                    endTurn();
                }
                return;
            }
            if (currentDice === 0 || parseInt(m.dataset.team) !== turn) return;
            move(m);
        }

        function move(m) {
            let nextStep = parseInt(m.dataset.step) + currentDice;
            if (nextStep >= paths[turn].length) {
                resetToHome(m);
                showFact(() => endTurn());
                return; 
            }
            m.dataset.step = nextStep;
            m.style.top = paths[turn][nextStep].t + "%";
            m.style.left = paths[turn][nextStep].l + "%";

            let fIdx = itemsOnBoard.findIndex(it => it.team === turn && it.step === nextStep);
            if (fIdx !== -1) {
                let type = itemsOnBoard[fIdx].type;
                itemsOnBoard.splice(fIdx, 1);
                renderItems();
                showFact(() => {
                    if (type === 'fish') startKickMode(); 
                    else { m.dataset.shield = 2; m.classList.add('shielded'); endTurn(); }
                });
            } else { setTimeout(endTurn, 450); }
        }

        function startKickMode() {
            isSelectingTarget = true;
            let found = false;
            document.querySelectorAll('.pawn').forEach(p => {
                if (parseInt(p.dataset.team) !== turn && parseInt(p.dataset.step) !== -1 && parseInt(p.dataset.shield) === 0) {
                    p.classList.add('targetable'); found = true;
                }
            });
            if (!found) endTurn();
            else document.getElementById('turn-display').innerText = "ĐÁ 1 ĐỐI THỦ!";
        }

        function resetToHome(m) {
            let t = parseInt(m.dataset.team), id = parseInt(m.dataset.id);
            m.style.top = homePositions[t].t[id] + "%";
            m.style.left = homePositions[t].l[id] + "%";
            m.dataset.step = -1; m.dataset.shield = 0; m.classList.remove('shielded');
        }

        function endTurn() {
            currentDice = 0; document.getElementById('dice-res').innerText = "🎲 0";
            document.getElementById('roll-btn').disabled = false;
            turn = (turn + 1) % 4;
            document.getElementById('turn-display').innerText = teamNames[turn];
            document.querySelectorAll(`.pawn[data-team="${turn}"]`).forEach(p => {
                let s = parseInt(p.dataset.shield);
                if (s > 0) { p.dataset.shield = s - 1; if (s-1 === 0) p.classList.remove('shielded'); }
            });
            updatePawnStatus();
        }

        function showFact(callback) {
            factCallback = callback;
            if (factPool.length === 0) factPool = [...allFacts];
            const idx = Math.floor(Math.random() * factPool.length);
            document.getElementById('fact-txt').innerText = factPool.splice(idx, 1)[0];
            openModal('fact-modal');
            let s = 5;
            const btn = document.getElementById('ok-btn');
            btn.disabled = true; btn.style.background = "#bbb";
            const timer = setInterval(() => {
                s--; document.getElementById('timer-display').innerText = s;
                if(s <= 0) { clearInterval(timer); btn.disabled = false; btn.style.background = "#9292ff"; btn.innerText = "XÁC NHẬN"; }
            }, 1000);
        }

        function closeFact() { closeModal('fact-modal'); if (factCallback) factCallback(); }

        function spawnItems() {
            itemsOnBoard = [];
            for(let i=0; i<15; i++) {
                itemsOnBoard.push({ team: Math.floor(Math.random()*4), step: Math.floor(Math.random()*7)+1, type: Math.random()>0.5?'fish':'cheese' });
            }
            renderItems();
        }

        function renderItems() {
            const layer = document.getElementById('items-layer');
            layer.innerHTML = '';
            itemsOnBoard.forEach(it => {
                const div = document.createElement('div');
                div.className = 'item';
                div.style.backgroundImage = `url(${it.type === 'fish' ? 'image_492b85.png' : 'image_492b6a.png'})`;
                div.style.top = paths[it.team][it.step].t + "%";
                div.style.left = paths[it.team][it.step].l + "%";
                layer.appendChild(div);
            });
        }

        function updatePawnStatus() {
            document.querySelectorAll('.pawn').forEach(p => {
                let isMy = parseInt(p.dataset.team) === turn;
                p.classList.toggle('active', isMy);
                p.style.opacity = isMy ? "1" : "0.5";
            });
        }

        function toggleMusic() {
            const m = document.getElementById('bgMusic');
            const b = document.getElementById('music-toggle');
            if (m.paused) { m.play(); b.innerText = "BẬT"; b.style.background = "#4caf50"; }
            else { m.pause(); b.innerText = "TẮT"; b.style.background = "#ff5252"; }
        }

        function copyLink() { navigator.clipboard.writeText(window.location.href).then(() => alert("Đã sao chép link game! 🐱")); }
    </script>
</body>
</html>
