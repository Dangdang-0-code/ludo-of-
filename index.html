<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ludo Of Facts - Class 7A5</title>
    <style>
        :root { --dp: #9292ff; --bg: #f3f0ff; --p: #bdb2ff; --gold: #ffd700; }
        body { margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* MÀN HÌNH LOADING HIỆN RÕ CÁC CON MÈO */
        #loading-screen { 
            position: fixed; inset: 0; 
            background: #fce4ec url('image_d98ded.jpg') no-repeat center; 
            background-size: contain; /* Đảm bảo hiện trọn vẹn cả dàn mèo và chữ Ludo Of Facts */
            z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end; 
            padding-bottom: 12vh; /* Đẩy thanh loading xuống dưới chân các con mèo */
        }

        .progress-bar { 
            width: 350px; height: 16px; 
            background: rgba(255,255,255,0.5); 
            border-radius: 20px; overflow: hidden; 
            border: 3px solid #5b87c5; 
            margin-bottom: 20px;
        }
        #fill { width: 0%; height: 100%; background: linear-gradient(90deg, #9a73ef, #ff85c0); transition: width 2s linear; }
        
        #btn-start { 
            display: none; padding: 12px 50px; border-radius: 40px; 
            background: #4a90e2; color: white; border: 4px solid #357abd; 
            cursor: pointer; font-weight: bold; font-size: 20px; 
            box-shadow: 0 6px 0 #2c5a94; transition: 0.1s;
        }
        #btn-start:active { transform: translateY(4px); box-shadow: 0 2px 0 #2c5a94; }

        /* GIAO DIỆN BÊN TRONG GAME (Theo mẫu bạn gửi) */
        #game-content { display: none; flex-direction: column; align-items: center; width: 100%; }
        #game-box { 
            position: relative; width: 85vh; height: 85vh; 
            background: white url('image_d97b87.jpg') no-repeat center; /* Dùng ảnh board bạn gửi */
            background-size: 100% 100%; border-radius: 10px; 
            box-shadow: 0 0 50px rgba(0,0,0,0.1); 
        }
        
        .pawn { width: 40px; height: 40px; position: absolute; z-index: 100; cursor: pointer; transform: translate(-50%, -50%); transition: 0.4s; }
        .pawn.active { filter: drop-shadow(0 0 10px var(--dp)); animation: bounce 0.5s infinite alternate; }
        
        /* CÁC NÚT ĐIỀU KHIỂN GÓC */
        .corner-btn { position: fixed; top: 20px; width: 45px; height: 45px; background: white; border: 2px solid var(--p); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 6000; font-size: 20px; }
        #settings-btn { left: 20px; }
        #help-btn { right: 20px; }

        @keyframes bounce { from { margin-top: 0; } to { margin-top: -5px; } }
        
        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .card { background: white; width: 380px; padding: 30px; border-radius: 25px; border: 5px solid var(--p); text-align: center; }
    </style> 
</head>
<body>

    <div id="loading-screen">
        <div class="progress-bar"><div id="fill"></div></div>
        <button id="btn-start" onclick="enterGame()">ENTER GAME</button>
    </div>

    <button id="settings-btn" class="corner-btn" onclick="openModal('settings-modal')">⚙️</button>
    <button id="help-btn" class="corner-btn" onclick="openModal('help-modal')">?</button>

    <div id="game-content">
        <div style="background: white; padding: 8px 30px; border-radius: 30px; margin-bottom: 10px; font-weight: bold; color: var(--dp); border: 2px solid var(--p);">
            Lượt: <span id="turn-display">Luca</span>
        </div>
        <div id="game-box">
            <div id="items-layer"></div>
        </div>
        <div style="margin-top: 15px; display: flex; align-items: center; gap: 20px;">
            <div id="dice-res" style="font-size: 30px; font-weight: bold; background: white; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 15px; border: 3px solid var(--p);">🎲</div>
            <button id="roll-btn" style="padding: 15px 40px; background: var(--dp); color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold;" onclick="roll()">ĐỔ XÚC XẮC</button>
        </div>
    </div>

    <div id="fact-modal" class="modal">
        <div class="card">
            <h3 style="color: var(--dp)">💡 KIẾN THỨC THÚ VỊ</h3>
            <p id="fact-txt" style="font-size: 17px; line-height: 1.5; margin: 20px 0;"></p>
            <div id="timer-display" style="font-size: 30px; font-weight: bold; color: var(--dp);">5</div>
            <button id="ok-btn" onclick="closeFact()" style="margin-top: 15px; padding: 10px 40px; border: none; border-radius: 20px; background: #bbb; color: white; cursor: pointer;">XÁC NHẬN</button>
        </div>
    </div>

    <audio id="bgMusic" loop src="pixel-drift-pecan-pie-main-version-41106-02-09.mp3"></audio>

    <script>
        // Copy phần Script từ bản code trước qua đây là chạy cực mượt!
        // Lưu ý thay đổi đường dẫn ảnh board thành 'image_d97b87.jpg' để khớp với hình bạn gửi.
        
        const allFacts = ["Mèo có 32 cơ ở mỗi tai.","Xương đùi cứng hơn bê tông.","Cá mập già hơn cây cối.","Mật ong không bao giờ hỏng."]; // Thêm fact tùy ý
        let turn = 0, currentDice = 0;
        const teamNames = ["Luca", "Meco", "Nero", "Gumo"];

        window.onload = () => {
            document.getElementById('fill').style.width = '100%';
            setTimeout(() => { document.getElementById('btn-start').style.display = 'block'; }, 2000); 
        };

        function enterGame() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('game-content').style.display = 'flex';
            document.getElementById('bgMusic').play();
            initPawns();
        }

        function initPawns() {
            const box = document.getElementById('game-box');
            const imgs = ['meo_den.png', 'meo_xiem.png', 'meo_vang.png', 'meo_trang.png'];
            // Tọa độ chuồng tương đối theo ảnh mới của bạn
            const homes = [
                {t:[23,23,34,34], l:[23,34,23,34]}, {t:[23,23,34,34], l:[66,77,66,77]},
                {t:[66,66,77,77], l:[23,34,23,34]}, {t:[66,66,77,77], l:[66,77,66,77]}
            ];
            imgs.forEach((img, tIdx) => {
                for(let i=0; i<4; i++) {
                    const m = document.createElement('img');
                    m.src = img; m.className = 'pawn';
                    m.style.top = homes[tIdx].t[i] + "%";
                    m.style.left = homes[tIdx].l[i] + "%";
                    box.appendChild(m);
                }
            });
        }

        function roll() {
            currentDice = Math.floor(Math.random()*6)+1;
            document.getElementById('dice-res').innerText = currentDice;
        }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
