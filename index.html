<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ludo Of Facts - Class 7A5</title>
    <style>
        :root { --dp: #9292ff; --bg: #f3f0ff; --p: #bdb2ff; --gold: #ffd700; }
        body { margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* Loading Screen */
        #loading-screen { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .progress-bar { width: 250px; height: 12px; background: #eee; border-radius: 10px; margin-top: 25px; overflow: hidden; }
        #fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--p), var(--dp)); transition: width 2s linear; }
        #btn-start { display: none; margin-top: 25px; padding: 12px 45px; border-radius: 30px; background: var(--dp); color: white; border: none; cursor: pointer; font-weight: bold; font-size: 18px; }

        /* Game Content */
        #game-content { display: none; flex-direction: column; align-items: center; }
        #game-box { position: relative; width: 78vh; height: 78vh; background: #fff; border: 4px solid var(--p); border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        
        .pawn { width: 40px; height: 40px; position: absolute; z-index: 100; cursor: pointer; transform: translate(-50%, -50%); transition: 0.4s ease-out; border-radius: 50%; }
        .pawn.active { filter: drop-shadow(0 0 8px var(--dp)); animation: shake 0.6s infinite; }
        .pawn.targetable { filter: drop-shadow(0 0 15px red); animation: pulseRed 0.5s infinite; z-index: 200; border: 3px solid red; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .card { background: white; width: 350px; padding: 30px; border-radius: 30px; border: 5px solid var(--p); text-align: center; }
        
        .corner-btn { position: fixed; top: 20px; width: 45px; height: 45px; background: white; border: 3px solid var(--p); border-radius: 50%; font-size: 24px; cursor: pointer; z-index: 6000; display: flex; align-items: center; justify-content: center; }
        #help-btn { right: 20px; }
        #settings-btn { left: 20px; }

        .item { width: 30px; height: 30px; position: absolute; z-index: 50; transform: translate(-50%, -50%); background-color: var(--p); border-radius: 50%; border: 2px solid white; }
        #items-layer { position: absolute; inset: 0; z-index: 60; pointer-events: none; }
        
        @keyframes pulseRed { from { transform: translate(-50%, -50%) scale(1); } to { transform: translate(-50%, -50%) scale(1.2); } }
        @keyframes shake { 0%, 100% { transform: translate(-50%, -50%) rotate(0); } 25% { transform: translate(-50%, -50%) rotate(5deg); } 75% { transform: translate(-50%, -50%) rotate(-5deg); } }
    </style> 
</head>
<body>

    <div id="loading-screen">
        <h2 style="color: var(--dp);">Ludo Of Facts</h2>
        <div class="progress-bar"><div id="fill"></div></div>
        <button id="btn-start" onclick="enterGame()">BẮT ĐẦU CHƠI</button>
    </div>

    <button id="settings-btn" class="corner-btn" onclick="openModal('settings-modal')">⚙️</button>
    <button id="help-btn" class="corner-btn" onclick="openModal('help-modal')">?</button>

    <div id="game-content">
        <div id="turn-info" style="font-size: 20px; margin-bottom: 10px; font-weight: bold; color: var(--dp);">Lượt: <span id="turn-display">Luca</span></div>
        <div id="game-box" style="background-image: url('board.png'); background-size: 100% 100%;"><div id="items-layer"></div></div>
        <div style="margin-top: 15px; display: flex; gap: 20px; align-items: center; background: white; padding: 10px 30px; border-radius: 50px;">
            <div id="dice-res" style="font-size: 28px; font-weight: bold;">🎲 0</div>
            <button id="roll-btn" onclick="roll()" style="padding: 10px 25px; background: var(--dp); color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold;">ĐỔ XÚC XẮC</button>
        </div>
    </div>

    <div id="settings-modal" class="modal" onclick="closeModal('settings-modal')">
        <div class="card" onclick="event.stopPropagation()">
            <h2 style="color: var(--dp)">⚙️ CÀI ĐẶT</h2>
            <button onclick="copyLink()" style="width: 100%; padding: 12px; margin: 10px 0; border: none; background: var(--p); color: white; border-radius: 15px; cursor: pointer; font-weight: bold;">COPY LINK GAME</button>
            <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px;">
                <p style="font-size: 12px; color: #888;">DEVELOPED BY:</p>
                <p style="font-weight: 900; color: var(--dp);">SANG - GIANG - ĐAN</p>
            </div>
            <button onclick="closeModal('settings-modal')" style="margin-top: 10px; border: none; background: #eee; padding: 8px 20px; border-radius: 10px;">ĐÓNG</button>
        </div>
    </div>

    <div id="fact-modal" class="modal">
        <div class="card">
            <h3 style="color: var(--dp)">💡 BẠN CÓ BIẾT?</h3>
            <p id="fact-txt" style="font-size: 16px; min-height: 60px;"></p>
            <div id="timer-display" style="font-size: 24px; font-weight: bold; color: var(--dp);">5</div>
            <button id="ok-btn" onclick="closeFact()" style="padding: 10px 30px; border: none; border-radius: 15px; background: #bbb; color: white;">ĐANG ĐỌC...</button>
        </div>
    </div>

    <script>
        // --- DATA & 50 FACTS ---
        const allFacts = ["Sứa bất tử có thể đảo ngược chu kỳ sống.", "Bọ hung kéo vật nặng gấp 1.141 lần cơ thể.", "Rùa biển có thể thở qua hậu môn.", "Bạch tuộc có 3 tim và 9 bộ não.", "Tôm tít đấm nhanh đến mức tạo ra nhiệt.", "Voi không thể nhảy.", "Chim ruồi có thể bay lùi.", "Mèo ngủ 70% cuộc đời.", "Sao Kim quay ngược chiều kim đồng hồ.", "Mật ong không bao giờ bị hỏng.", "Ốc sên có thể ngủ 3 năm.", "Tiếng vịt không có tiếng vang.", "Mắt đà điểu to hơn não.", "Hươu cao cổ không có dây thanh quản.", "Lưỡi cá voi xanh nặng bằng một con voi.", "Cá mập già hơn cây cối.", "Kiến không bao giờ ngủ.", "Hà mã đổ mồ hôi màu đỏ.", "Kanguru không thể đi lùi.", "Lợn không thể nhìn lên trời.", "Gấu Bắc Cực da màu đen.", "Hổ có da vằn như lông.", "Mây nặng khoảng 500 tấn.", "Vàng có thể ăn được.", "Âm thanh dưới nước nhanh gấp 4 lần.", "Sao Kim ngày dài hơn năm.", "Koala có vân tay như người.", "Xương đùi cứng hơn bê tông.", "Trẻ em nhiều xương hơn người lớn.", "Não hoạt động mạnh hơn khi ngủ.", "Răng người cứng ngang đá.", "Bướm nếm bằng chân.", "Sao Thổ có mưa kim cương.", "Kiến có thể nhấc vật nặng gấp 50 lần.", "Mỗi người có một dấu lưỡi riêng.", "Cá vàng nhớ được vài tháng.", "Lạc đà có 3 mí mắt.", "Chuột sợ tiếng cười của chính mình.", "Bọ ngựa có tai ở giữa hai chân.", "Voi gọi nhau bằng hạ âm.", "Tàu vũ trụ đi qua sao Thổ mất 7 năm.", "Muỗi thích người nhóm máu O.", "Con người cao thêm vào buổi sáng.", "Trái tim đập 100.000 lần mỗi ngày.", "Sét đánh 100 lần mỗi giây.", "Kim cương là vật chất cứng nhất.", "Cá ngựa đực đẻ con.", "Bạch tuộc phun mực để chạy trốn.", "Gấu trúc ăn 12 tiếng mỗi ngày.", "Chim ruồi tim đập 1200 lần/phút."];
        
        let factPool = [...allFacts];
        const paths = [[{t:6, l:44.5}, {t:13, l:44.5}, {t:20, l:44.5}, {t:27, l:44.5}, {t:34, l:44.5}, {t:41, l:38}, {t:41, l:31}, {t:41, l:24}, {t:41, l:17}, {t:41, l:10}],[{t:44.5, l:94}, {t:44.5, l:87}, {t:44.5, l:80}, {t:44.5, l:73}, {t:44.5, l:66}, {t:38, l:59}, {t:31, l:59}, {t:24, l:59}, {t:17, l:59}, {t:10, l:59}],[{t:55.5, l:6}, {t:55.5, l:13}, {t:55.5, l:20}, {t:55.5, l:27}, {t:55.5, l:34}, {t:62, l:41}, {t:69, l:41}, {t:76, l:41}, {t:83, l:41}, {t:90, l:41}],[{t:94, l:55.5}, {t:87, l:55.5}, {t:80, l:55.5}, {t:73, l:55.5}, {t:66, l:55.5}, {t:59, l:62}, {t:59, l:69}, {t:59, l:76}, {t:59, l:83}, {t:59, l:90}]];
        const homePositions = [{t:[17,17,28,28], l:[17,28,17,28]}, {t:[17,17,28,28], l:[72,83,72,83]}, {t:[72,72,83,83], l:[17,28,17,28]}, {t:[72,72,83,83], l:[72,83,72,83]}];
        
        let turn = 0, currentDice = 0, itemsOnBoard = [], isSelectingTarget = false, factCallback = null;
        const teamNames = ["Luca", "Meco", "Nero", "Gumo"];

        window.onload = () => {
            document.getElementById('fill').style.width = '100%';
            setTimeout(() => { document.getElementById('btn-start').style.display = 'block'; }, 2000);
        };

        function enterGame() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('game-content').style.display = 'flex';
            init();
        }

        function init() {
    const box = document.getElementById('game-box');
    box.querySelectorAll('.pawn').forEach(p => p.remove());
    const imgs = ['meo_den.png', 'meo_xiem.png', 'meo_vang.png', 'meo_trang.png'];
    
    for(let tIdx=0; tIdx<4; tIdx++) {
        for(let i=0; i<4; i++) {
            const m = document.createElement('img'); // Đổi sang thẻ img
            m.className = 'pawn';
            m.src = imgs[tIdx]; // Gán hình ảnh tương ứng với đội
            // Bỏ dòng m.style.backgroundColor cũ đi
        }
    }
    spawnItems();
    updatePawnStatus();
}
        function roll() {
            if(currentDice > 0 || isSelectingTarget) return;
            currentDice = Math.floor(Math.random()*6)+1;
            document.getElementById('dice-res').innerText = "🎲 " + currentDice;
            document.getElementById('roll-btn').disabled = true;
        }

        function handlePawnClick(m) {
            if (isSelectingTarget) {
                if (parseInt(m.dataset.team) !== turn && parseInt(m.dataset.step) !== -1) {
                    resetToHome(m);
                    document.querySelectorAll('.pawn').forEach(p => p.classList.remove('targetable'));
                    isSelectingTarget = false;
                    endTurn();
                }
                return;
            }
            if (currentDice === 0 || parseInt(m.dataset.team) !== turn) return;
            move(m);
        }

        function move(m) {
            let nextStep = parseInt(m.dataset.step) + currentDice;
            if (nextStep >= paths[turn].length) {
                resetToHome(m);
                showFact(() => endTurn());
                return;
            }
            m.dataset.step = nextStep;
            m.style.top = paths[turn][nextStep].t + "%";
            m.style.left = paths[turn][nextStep].l + "%";

            let fIdx = itemsOnBoard.findIndex(it => it.team === turn && it.step === nextStep);
            if (fIdx !== -1) {
                let type = itemsOnBoard[fIdx].type;
                itemsOnBoard.splice(fIdx, 1);
                renderItems();
                showFact(() => {
                    if (type === 'fish') startKickMode(); else endTurn();
                });
            } else {
                setTimeout(endTurn, 400);
            }
        }

        function startKickMode() {
            isSelectingTarget = true;
            let count = 0;
            document.querySelectorAll('.pawn').forEach(p => {
                if (parseInt(p.dataset.team) !== turn && parseInt(p.dataset.step) !== -1) {
                    p.classList.add('targetable'); count++;
                }
            });
            if (count === 0) endTurn();
        }

        function resetToHome(m) {
            let t = parseInt(m.dataset.team), id = parseInt(m.dataset.id);
            m.style.top = homePositions[t].t[id] + "%";
            m.style.left = homePositions[t].l[id] + "%";
            m.dataset.step = -1;
        }

        function endTurn() {
            currentDice = 0; document.getElementById('dice-res').innerText = "🎲 0";
            document.getElementById('roll-btn').disabled = false;
            turn = (turn + 1) % 4;
            document.getElementById('turn-display').innerText = teamNames[turn];
            updatePawnStatus();
        }

        function showFact(callback) {
            factCallback = callback;
            if (factPool.length === 0) factPool = [...allFacts];
            const idx = Math.floor(Math.random() * factPool.length);
            document.getElementById('fact-txt').innerText = factPool.splice(idx, 1)[0];
            openModal('fact-modal');
            let s = 5;
            const btn = document.getElementById('ok-btn');
            btn.disabled = true; btn.style.background = "#bbb";
            const timer = setInterval(() => {
                s--; document.getElementById('timer-display').innerText = s;
                if(s <= 0) { clearInterval(timer); btn.disabled = false; btn.style.background = "#9292ff"; btn.innerText = "XÁC NHẬN"; }
            }, 1000);
        }

        function closeFact() { closeModal('fact-modal'); if (factCallback) factCallback(); }
        function spawnItems() {
            itemsOnBoard = [];
            for(let i=0; i<10; i++) {
                itemsOnBoard.push({ team: Math.floor(Math.random()*4), step: Math.floor(Math.random()*7)+1, type: Math.random()>0.5?'fish':'cheese' });
            }
            renderItems();
        }
        function renderItems() {
            const layer = document.getElementById('items-layer');
            layer.innerHTML = '';
            itemsOnBoard.forEach(it => {
                const div = document.createElement('div');
                div.className = 'item';
                div.style.top = paths[it.team][it.step].t + "%";
                div.style.left = paths[it.team][it.step].l + "%";
                layer.appendChild(div);
            });
        }
        function updatePawnStatus() {
            document.querySelectorAll('.pawn').forEach(p => {
                p.classList.toggle('active', parseInt(p.dataset.team) === turn);
                p.style.opacity = parseInt(p.dataset.team) === turn ? "1" : "0.5";
            });
        }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function copyLink() { navigator.clipboard.writeText(window.location.href).then(() => alert("Đã copy link!")); }
    </script>
</body>
</html>
