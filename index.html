<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ludo Of Facts - 7A5</title>
    <style>
        :root { --p: #bdb2ff; --dp: #9292ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fce4ec; font-family: 'Segoe UI', sans-serif; }

        /* MÀN HÌNH CHỜ */
        #loading-screen { 
            position: fixed; inset: 0; background: #fce4ec url('image_d98ded.jpg') no-repeat center top; 
            background-size: contain; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 50px;
        }
        #real-enter-btn {
            padding: 20px 60px; font-size: 26px; font-weight: bold; color: white;
            background: #3a86ff; border: 4px solid white; border-radius: 50px;
            cursor: pointer; box-shadow: 0 8px 15px rgba(0,0,0,0.2); transition: 0.2s;
        }
        #real-enter-btn:hover { transform: scale(1.05); background: #0056b3; }

        /* GAME CONTENT */
        #game-content { display: none; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: #f3f0ff; }
        #game-box { 
            position: relative; width: 88vh; height: 88vh; 
            background: white url('board.png') no-repeat center center; 
            background-size: 100% 100%; border-radius: 20px;
        }

        /* MÈO SIÊU TO */
        .pawn { width: 10vh; height: 10vh; position: absolute; z-index: 100; cursor: pointer; transform: translate(-50%, -50%); transition: 0.4s; }
        .pawn.active { filter: drop-shadow(0 0 15px gold); animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { margin-top: 0; } to { margin-top: -15px; } }

        /* ITEM PHÔ MAI & CÁ (ĐÚNG TÊN FILE) */
        .item { position: absolute; width: 7vh; height: 7vh; z-index: 50; transform: translate(-50%, -50%); }

        .ui-btn { position: absolute; top: 20px; width: 55px; height: 55px; background: white; border: 3px solid var(--p); border-radius: 50%; cursor: pointer; font-size: 25px; display: flex; align-items: center; justify-content: center; }
        .bottom-ui { margin-top: 15px; display: flex; align-items: center; gap: 20px; background: white; padding: 10px 40px; border-radius: 50px; border: 3px solid var(--p); }
        #roll-btn { padding: 12px 35px; background: var(--dp); color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 18px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9000; align-items: center; justify-content: center; }
        .card { background: white; width: 420px; padding: 30px; border-radius: 30px; border: 6px solid var(--p); }
    </style>
</head>
<body>

    <div id="loading-screen">
        <button id="real-enter-btn" onclick="startGame()">ENTER GAME</button>
    </div>

    <div id="game-content">
        <button class="ui-btn" style="left: 20px;" onclick="openM('s')">⚙️</button>
        <button class="ui-btn" style="right: 20px;" onclick="openM('h')">❓</button>
        <div id="game-box"></div>
        <div class="bottom-ui">
            <div id="dice-res" style="font-size: 35px;">🎲</div>
            <button id="roll-btn" onclick="rollD()">ĐỔ XÚC XẮC</button>
        </div>
    </div>

    <div id="h" class="modal" onclick="this.style.display='none'">
        <div class="card" onclick="event.stopPropagation()">
            <h2 style="color:var(--dp); text-align:center;">📜 HƯỚNG DẪN</h2>
            <p>🧀 <b>Phô mai:</b> Nhận thêm 1 lượt đi đặc biệt.</p>
            <p>🐟 <b>Cá:</b> Giúp mèo phóng nhanh thêm 2 ô.</p>
            <p>💡 <b>Facts:</b> Trả lời câu hỏi kiến thức ở vạch đích để thắng!</p>
            <button onclick="closeM('h')" style="width:100%; padding:10px; background:var(--dp); color:white; border:none; border-radius:10px; cursor:pointer;">ĐÃ HIỂU</button>
        </div>
    </div>

    <div id="s" class="modal" onclick="this.style.display='none'">
        <div class="card" onclick="event.stopPropagation()">
            <h2 style="color:var(--dp); text-align:center;">⚙️ CÀI ĐẶT</h2>
            <button id="m-toggle" onclick="toggleM()" style="width:100%; padding:15px; border-radius:15px; border:2px solid var(--p); cursor:pointer; font-weight:bold;">ÂM THANH: BẬT ✅</button>
            <p style="text-align:center; color:#888; margin-top:20px;">Sang - Giang - Đan (7A5)</p>
        </div>
    </div>

    <audio id="bgMusic" loop src="pixel-drift-pecan-pie-main-version-41106-02-09.mp3"></audio>

    <script>
        let turn = 0, dice = 0, musicOn = true;
        const teams = ["Luca", "Meco", "Nero", "Gumo"];
        const pFiles = ['meo_den.png', 'meo_xiem.png', 'meo_vang.png', 'meo_trang.png'];
        const itemFiles = ['image_492b6a.png', 'image_492b85.png']; // Đúng tên file phô mai & cá

        function startGame() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('game-content').style.display = 'flex';
            document.getElementById('bgMusic').play().catch(()=>{});
            init();
        }

        function init() {
            const b = document.getElementById('game-box'); b.innerHTML = '';
            // Rải item
            for(let i=0; i<10; i++) {
                const img = document.createElement('img');
                img.src = itemFiles[i % 2]; img.className = 'item';
                img.style.top = (25 + Math.random()*50) + '%';
                img.style.left = (25 + Math.random()*50) + '%';
                b.appendChild(img);
            }
            // Tọa độ mèo to
            const pos = [
                {t:[18,18,32,32],l:[18,32,18,32]},{t:[18,18,32,32],l:[68,82,68,82]},
                {t:[68,68,82,82],l:[18,32,18,32]},{t:[68,68,82,82],l:[68,82,68,82]}
            ];
            for(let t=0; t<4; t++) for(let i=0; i<4; i++) {
                const p = document.createElement('img'); p.src = pFiles[t]; p.className = 'pawn';
                p.style.top = pos[t].t[i]+'%'; p.style.left = pos[t].l[i]+'%';
                p.onclick = () => { if(t===turn && dice>0) { p.style.top='48%'; p.style.left='48%'; dice=0; turn=(turn+1)%4; document.querySelectorAll('.pawn').forEach(x=>x.classList.remove('active')); } };
                b.appendChild(p);
            }
        }

        function rollD() { if(dice!==0) return; dice=Math.floor(Math.random()*6)+1; document.getElementById('dice-res').innerText=dice; document.querySelectorAll('.pawn').forEach(p=> { if(p.src.includes(pFiles[turn])) p.classList.add('active'); }); }
        function toggleM() { const a = document.getElementById('bgMusic'); if(musicOn){ a.pause(); document.getElementById('m-toggle').innerText="ÂM THANH: TẮT ❌"; } else { a.play(); document.getElementById('m-toggle').innerText="ÂM THANH: BẬT ✅"; } musicOn=!musicOn; }
        function openM(id){ document.getElementById(id).style.display='flex'; }
        function closeM(id){ document.getElementById(id).style.display='none'; }
    </script>
</body>
</html>
