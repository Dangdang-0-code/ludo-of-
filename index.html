<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ludo Of Facts - Cờ Cá Ngựa Online</title>
    <style>
        :root { --dp: #9292ff; --bg: #f3f0ff; --p: #bdb2ff; --gold: #ffd700; }
        body { margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        #loading-screen { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .progress-bar { width: 250px; height: 12px; background: #eee; border-radius: 10px; margin-top: 25px; overflow: hidden; border: 2px solid #f0f0f0; }
        #fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--p), var(--dp)); transition: width 2s linear; }
        #btn-start { display: none; margin-top: 25px; padding: 12px 45px; border-radius: 30px; background: var(--dp); color: white; border: none; cursor: pointer; font-weight: bold; font-size: 18px; box-shadow: 0 4px 15px rgba(146, 146, 255, 0.4); }

        #game-content { display: none; flex-direction: column; align-items: center; opacity: 0; transition: 0.8s; }
        #game-box { position: relative; width: 78vh; height: 78vh; background: white url('board.png') no-repeat center; background-size: 100% 100%; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }

        /* FIX MÈO GIỮA Ô & MECO GẦY */
        .pawn { 
            width: 42px !important; height: 42px !important; position: absolute !important; z-index: 100; cursor: pointer;
            transform-origin: center center !important;
            transform: translate(-50%, -50%) scale(var(--s, 1)) !important; 
            transition: all 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
        }
        img.pawn[src*="meo_xiem.png"] { --s: 0.8 !important; }
        .pawn.active { filter: drop-shadow(0 0 8px var(--dp)) !important; animation: shake 0.6s infinite !important; }
        .pawn.targetable { filter: drop-shadow(0 0 15px red) !important; z-index: 200 !important; animation: pulseRed 0.5s infinite alternate !important; }
        .pawn.shielded { filter: drop-shadow(0 0 12px var(--gold)) !important; border: 3px solid var(--gold) !important; border-radius: 50% !important; }

        @keyframes shake { 
            0%, 100% { transform: translate(-50%, -50%) scale(var(--s, 1)) rotate(0); } 
            25% { transform: translate(-50%, -50%) scale(var(--s, 1)) rotate(5deg); } 
            75% { transform: translate(-50%, -50%) scale(var(--s, 1)) rotate(-5deg); } 
        }
        @keyframes pulseRed { 
            from { transform: translate(-50%, -50%) scale(var(--s, 1)); } 
            to { transform: translate(-50%, -50%) scale(calc(var(--s, 1) * 1.25)); } 
        }

        .modal { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.96); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .card { background: white; width: 380px; padding: 35px; border-radius: 30px; border: 5px solid var(--p); text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.1); position: relative; }
        .corner-btn { position: fixed; top: 20px; width: 45px; height: 45px; background: white; border: 3px solid var(--p); border-radius: 50%; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 6000; }
        #help-btn { right: 20px; } #settings-btn { left: 20px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; padding: 10px; background: #f8f9fa; border-radius: 15px; }
        .item { width: 25px; height: 25px; position: absolute; z-index: 50; transform: translate(-50%, -50%); background-size: contain; background-repeat: no-repeat; }
    </style> 
</head>
<body>
    <div id="loading-screen">
        <div style="font-size: 50px; margin-bottom: 10px;">🐱</div>
        <h2 style="color: var(--dp); letter-spacing: 3px; margin: 0;">Ludo Of Facts</h2>
        <div class="progress-bar"><div id="fill"></div></div>
        <button id="btn-start" onclick="enterGame()">BẮT ĐẦU CHƠI</button>
    </div>

    <button id="settings-btn" class="corner-btn" onclick="openModal('settings-modal')">⚙️</button>
    <button id="help-btn" class="corner-btn" onclick="openModal('help-modal')">?</button>

    <div id="game-content">
        <div id="turn-info" style="font-size: 22px; font-weight: bold; color: var(--dp); background: white; padding: 8px 35px; border-radius: 50px; margin-bottom: 10px;">Lượt: <span id="turn-display">Luca</span></div>
        <div id="game-box"><div id="items-layer"></div></div>
        <div style="display: flex; align-items: center; gap: 25px; margin-top: 15px; background: white; padding: 10px 40px; border-radius: 50px;">
            <div id="dice-res" style="font-size: 32px;">🎲 0</div>
            <button id="roll-btn" style="padding: 10px 30px; background: var(--dp); color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold;" onclick="roll()">ĐỔ XÚC XẮC</button>
        </div>
    </div>

    <div id="help-modal" class="modal" onclick="closeModal('help-modal')">
        <div class="card" onclick="event.stopPropagation()">
            <h2 style="color: var(--dp); margin-top:0;">📜 LUẬT CHƠI</h2>
            <p>Về đích để hồi chuồng. Ăn Cá để đá đối thủ. Ăn Phô mai để bảo vệ.</p>
            <button onclick="closeModal('help-modal')" style="background: var(--dp); color: white; border: none; padding: 10px 30px; border-radius: 20px; cursor: pointer;">ĐÃ HIỂU</button>
        </div>
    </div>
    
    <div id="settings-modal" class="modal" onclick="closeModal('settings-modal')">
        <div class="card" onclick="event.stopPropagation()">
            <h2 style="color: var(--dp); margin-top:0;">⚙️ CÀI ĐẶT</h2>
            <div class="setting-row"><span>Âm thanh</span><button id="music-toggle" onclick="toggleMusic()" style="background:#4caf50;color:white;border:none;padding:5px 15px;border-radius:10px;">BẬT</button></div>
            <div class="setting-row"><span>Chia sẻ</span><button onclick="copyLink()" style="background:var(--dp);color:white;border:none;padding:5px 15px;border-radius:10px;">COPY</button></div>
            <p>SẢN PHẨM BỞI: <strong>SANG - GIANG - ĐAN</strong></p>
            <button onclick="closeModal('settings-modal')" style="background:#eee;border:none;padding:10px 30px;border-radius:20px;">ĐÓNG</button>
        </div>
    </div>

    <div id="fact-modal" class="modal">
        <div class="card">
            <h3 style="color: var(--dp)">💡 BẠN CÓ BIẾT?</h3>
            <p id="fact-txt" style="font-size: 18px; line-height: 1.6; min-height: 80px;"></p>
            <div id="timer-display" style="font-size: 40px; font-weight: 900; color: var(--dp);">5</div>
            <button id="ok-btn" disabled onclick="closeFact()" style="background: #bbb; border: none; padding: 12px 40px; border-radius: 20px; color: white;">HÃY ĐỌC KỸ...</button>
        </div>
    </div>

    <audio id="bgMusic" loop src="pixel-drift-pecan-pie-main-version-41106-02-09.mp3"></audio>

    <script>
        // --- 1. DÁN 50 FACTS CỦA BẠN VÀO ĐÂY ---
        const allFacts = [
            "Fact 1", "Fact 2", "Fact 3", "Fact 4", "Fact 5", "Fact 6", "Fact 7", "Fact 8", "Fact 9", "Fact 10",
            "Fact 11", "Fact 12", "Fact 13", "Fact 14", "Fact 15", "Fact 16", "Fact 17", "Fact 18", "Fact 19", "Fact 20",
            "Fact 21", "Fact 22", "Fact 23", "Fact 24", "Fact 25", "Fact 26", "Fact 27", "Fact 28", "Fact 29", "Fact 30",
            "Fact 31", "Fact 32", "Fact 33", "Fact 34", "Fact 35", "Fact 36", "Fact 37", "Fact 38", "Fact 39", "Fact 40",
            "Fact 41", "Fact 42", "Fact 43", "Fact 44", "Fact 45", "Fact 46", "Fact 47", "Fact 48", "Fact 49", "Fact 50"
        ];

        // --- 2. CÁC HÀM XỬ LÝ (KHÔNG THAY ĐỔI) ---
        let factPool = [...allFacts];
        let currentDice = 0, turn = 0, isSelectingTarget = false;
        const teamNames = ["Luca", "Meco", "Nero", "Gumo"];
        const paths = [
            [{t:6, l:44.5}, {t:13, l:44.5}, {t:20, l:44.5}, {t:27, l:44.5}, {t:34, l:44.5}, {t:41, l:38}, {t:41, l:31}, {t:41, l:24}, {t:41, l:17}, {t:41, l:10}],
            [{t:44.5, l:94}, {t:44.5, l:87}, {t:44.5, l:80}, {t:44.5, l:73}, {t:44.5, l:66}, {t:38, l:59}, {t:31, l:59}, {t:24, l:59}, {t:17, l:59}, {t:10, l:59}],
            [{t:55.5, l:6}, {t:55.5, l:13}, {t:55.5, l:20}, {t:55.5, l:27}, {t:55.5, l:34}, {t:62, l:41}, {t:69, l:41}, {t:76, l:41}, {t:83, l:41}, {t:90, l:41}],
            [{t:94, l:55.5}, {t:87, l:55.5}, {t:80, l:55.5}, {t:73, l:55.5}, {t:66, l:55.5}, {t:59, l:62}, {t:59, l:69}, {t:59, l:76}, {t:59, l:83}, {t:59, l:90}]
        ];
        const homePositions = [
            {t:[17,17,28,28], l:[17,28,17,28]}, {t:[17,17,28,28], l:[72,83,72,83]}, 
            {t:[72,72,83,83], l:[17,28,17,28]}, {t:[72,72,83,83], l:[72,83,72,83]}
        ];

        window.onload = () => {
            document.getElementById('fill').style.width = '100%';
            setTimeout(() => { document.getElementById('btn-start').style.display = 'block'; }, 2000); 
        };

        function enterGame() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('game-content').style.display = 'flex';
            document.getElementById('game-content').style.opacity = '1';
            init();
        }

        function init() {
            const box = document.getElementById('game-box');
            box.innerHTML = '<div id="items-layer"></div>'; 
            const imgs = ['meo_den.png', 'meo_xiem.png', 'meo_vang.png', 'meo_trang.png'];
            imgs.forEach((img, tIdx) => {
                for(let i=0; i<4; i++) {
                    const m = document.createElement('img');
                    m.src = img; m.className = 'pawn';
                    m.dataset.team = tIdx; m.dataset.id = i; m.dataset.step = -1;
                    m.style.top = homePositions[tIdx].t[i] + "%"; m.style.left = homePositions[tIdx].l[i] + "%";
                    m.onclick = () => handlePawnClick(m);
                    box.appendChild(m);
                }
            });
            updatePawnStatus();
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function toggleMusic() {
            const m = document.getElementById('bgMusic');
            const b = document.getElementById('music-toggle');
            if(m.paused) { m.play(); b.innerText="TẮT"; b.style.background="#f44336"; }
            else { m.pause(); b.innerText="BẬT"; b.style.background="#4caf50"; }
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            alert("Đã copy link game!");
        }

        function roll() {
            if(currentDice > 0) return;
            currentDice = Math.floor(Math.random()*6)+1;
            document.getElementById('dice-res').innerText = "🎲 " + currentDice;
            document.getElementById('roll-btn').disabled = true;
        }

        function handlePawnClick(m) {
            if (parseInt(m.dataset.team) !== turn || currentDice === 0) return;
            let nextStep = parseInt(m.dataset.step) + currentDice;
            if (nextStep >= paths[turn].length) {
                resetToHome(m); showFact(); endTurn();
            } else {
                m.dataset.step = nextStep;
                m.style.top = paths[turn][nextStep].t + "%";
                m.style.left = paths[turn][nextStep].l + "%";
                endTurn();
            }
        }

        function resetToHome(m) {
            let t = parseInt(m.dataset.team), id = parseInt(m.dataset.id);
            m.style.top = homePositions[t].t[id] + "%"; m.style.left = homePositions[t].l[id] + "%";
            m.dataset.step = -1;
        }

        function endTurn() {
            currentDice = 0; document.getElementById('dice-res').innerText = "🎲 0";
            document.getElementById('roll-btn').disabled = false;
            turn = (turn + 1) % 4;
            document.getElementById('turn-display').innerText = teamNames[turn];
            updatePawnStatus();
        }

        function updatePawnStatus() {
            document.querySelectorAll('.pawn').forEach(p => {
                p.style.opacity = parseInt(p.dataset.team) === turn ? "1" : "0.5";
                p.classList.toggle('active', parseInt(p.dataset.team) === turn);
            });
        }

        function showFact() {
            const fact = factPool.splice(Math.floor(Math.random()*factPool.length), 1)[0];
            document.getElementById('fact-txt').innerText = fact;
            if(factPool.length === 0) factPool = [...allFacts];
            openModal('fact-modal');
            let s = 5; document.getElementById('timer-display').innerText = s;
            const btn = document.getElementById('ok-btn');
            btn.disabled = true;
            const t = setInterval(() => {
                s--; document.getElementById('timer-display').innerText = s;
                if(s <= 0) { clearInterval(t); btn.disabled = false; btn.innerText="XÁC NHẬN!"; btn.style.background="#9292ff"; }
            }, 1000);
        }
        function closeFact() { closeModal('fact-modal'); }
    </script>
</body>
</html>
