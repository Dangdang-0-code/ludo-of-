<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Ludo Of Facts - Cờ Cá Ngựa Online</title>
<style>
:root { --dp: #9292ff; --bg: #f3f0ff; --p: #bdb2ff; --gold: #ffd700; }
body { margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

#game-box {
    position: relative;
    width: 78vh;
    height: 78vh;
    background: white url('board.png') no-repeat center;
    background-size: contain; /* FIX */
    border-radius: 15px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}

.pawn { width: 42px; height: 42px; position: absolute; z-index: 100; cursor: pointer; transform: translate(-50%, -50%); transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); }

/* mèo xiêm */
img.pawn[src*="meo_xiem.png"] { transform: translate(-50%, -50%) scale(0.8); }

@keyframes shake { 
0%,100%{ transform: translate(-50%,-50%) rotate(0);} 
25%{ transform: translate(-50%,-50%) rotate(5deg);} 
75%{ transform: translate(-50%,-50%) rotate(-5deg);} 
}

@keyframes shakeXiem { 
0%,100%{ transform: translate(-50%,-50%) scale(0.8) rotate(0);} 
25%{ transform: translate(-50%,-50%) scale(0.8) rotate(5deg);} 
75%{ transform: translate(-50%,-50%) scale(0.8) rotate(-5deg);} 
}
</style>
</head>
<body>

<div id="game-content">
<div id="game-box"></div>
</div>

<script>
// ===== FIX GRID =====
const cell = 100 / 15;
const offset = 2.8; // chỉnh nếu cần
const c = (n) => n * cell + cell / 2 + offset;

// ===== PATHS FIX =====
const paths = [
[
{t:c(1),l:c(7)},{t:c(2),l:c(7)},{t:c(3),l:c(7)},{t:c(4),l:c(7)},{t:c(5),l:c(7)},
{t:c(6),l:c(6)},{t:c(6),l:c(5)},{t:c(6),l:c(4)},{t:c(6),l:c(3)},{t:c(6),l:c(2)}
],
[
{t:c(7),l:c(13)},{t:c(7),l:c(12)},{t:c(7),l:c(11)},{t:c(7),l:c(10)},{t:c(7),l:c(9)},
{t:c(6),l:c(8)},{t:c(5),l:c(8)},{t:c(4),l:c(8)},{t:c(3),l:c(8)},{t:c(2),l:c(8)}
],
[
{t:c(13),l:c(7)},{t:c(12),l:c(7)},{t:c(11),l:c(7)},{t:c(10),l:c(7)},{t:c(9),l:c(7)},
{t:c(8),l:c(6)},{t:c(8),l:c(5)},{t:c(8),l:c(4)},{t:c(8),l:c(3)},{t:c(8),l:c(2)}
],
[
{t:c(7),l:c(1)},{t:c(7),l:c(2)},{t:c(7),l:c(3)},{t:c(7),l:c(4)},{t:c(7),l:c(5)},
{t:c(8),l:c(6)},{t:c(9),l:c(6)},{t:c(10),l:c(6)},{t:c(11),l:c(6)},{t:c(12),l:c(6)}
]
];

// test pawn
const box = document.getElementById('game-box');
paths[0].forEach(p=>{
let m=document.createElement('div');
m.className='pawn';
m.style.top=p.t+'%';
m.style.left=p.l+'%';
m.style.background='red';
box.appendChild(m);
});
</script>

</body>
</html>
