<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ludo Of Facts - Cờ Cá Ngựa Online</title>
    <style>
        :root { --dp: #9292ff; --bg: #f3f0ff; --p: #bdb2ff; --gold: #ffd700; }
        body { margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        #loading-screen { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .progress-bar { width: 250px; height: 12px; background: #eee; border-radius: 10px; margin-top: 25px; overflow: hidden; border: 2px solid #f0f0f0; }
        #fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--p), var(--dp)); transition: width 2s linear; }
        #btn-start { display: none; margin-top: 25px; padding: 12px 45px; border-radius: 30px; background: var(--dp); color: white; border: none; cursor: pointer; font-weight: bold; }

        #game-content { display: none; flex-direction: column; align-items: center; }
        #game-box { position: relative; width: 78vh; height: 78vh; background: white url('board.png') no-repeat center; background-size: 100% 100%; border-radius: 15px; }

        /* FIX LỖI MÈO XIÊM VÀ LỆCH Ô */
        .pawn { 
            width: 42px !important; height: 42px !important; position: absolute !important; z-index: 100; cursor: pointer;
            transform: translate(-50%, -50%) scale(var(--s, 1)) !important; 
            transform-origin: center center !important;
            transition: all 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
        }
        img.pawn[src*="meo_xiem.png"] { --s: 0.8 !important; }

        .pawn.active { filter: drop-shadow(0 0 8px var(--dp)) !important; animation: shake 0.6s infinite !important; }
        .pawn.targetable { filter: drop-shadow(0 0 15px red) !important; z-index: 200 !important; animation: pulseRed 0.5s infinite alternate !important; }
        
        @keyframes shake { 
            0%, 100% { transform: translate(-50%, -50%) scale(var(--s, 1)) rotate(0); } 
            25% { transform: translate(-50%, -50%) scale(var(--s, 1)) rotate(5deg); } 
            75% { transform: translate(-50%, -50%) scale(var(--s, 1)) rotate(-5deg); } 
        }
        @keyframes pulseRed { 
            from { transform: translate(-50%, -50%) scale(var(--s, 1)); } 
            to { transform: translate(-50%, -50%) scale(calc(var(--s, 1) * 1.25)); } 
        }

        .modal { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.96); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .card { background: white; width: 380px; padding: 35px; border-radius: 30px; border: 5px solid var(--p); text-align: center; }
        .corner-btn { position: fixed; top: 20px; width: 45px; height: 45px; background: white; border: 3px solid var(--p); border-radius: 50%; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 6000; }
        #help-btn { right: 20px; } #settings-btn { left: 20px; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div style="font-size: 50px; margin-bottom: 10px;">🐱</div>
        <h2 style="color: var(--dp); letter-spacing: 3px; margin: 0;">Ludo Of Facts</h2>
        <div class="progress-bar"><div id="fill"></div></div>
        <button id="btn-start" onclick="enterGame()">BẮT ĐẦU CHƠI</button>
    </div>

    <button id="settings-btn" class="corner-btn" onclick="openModal('settings-modal')">⚙️</button>
    <button id="help-btn" class="corner-btn" onclick="openModal('help-modal')">?</button>

    <div id="game-content">
        <div id="game-box">
            <div id="items-layer"></div>
            </div>
    </div>

    <script>
        function enterGame() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('game-content').style.display = 'flex';
        }
        // Thêm các hàm openModal, tạo mèo của bạn vào đây
    </script>
</body>
</html>
