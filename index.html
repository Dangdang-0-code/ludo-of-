<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ludo Of Facts - 7A5</title>
    <style>
        :root { --p: #bdb2ff; --dp: #9292ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fce4ec; font-family: 'Segoe UI', sans-serif; }

#loading-screen { 
    position: fixed; 
    inset: 0; 
    /* Dùng màu hồng nền trùng với ảnh để không bị lộ viền trắng */
    background-color: #fce4ec; 
    z-index: 9999; 
    display: flex; 
    align-items: center; 
    justify-content: center;
}

#loading-img {
    /* Ép ảnh hiện nguyên vẹn 100%, không bao giờ bị cắt chữ Ludo Of Facts */
    max-width: 100%;
    max-height: 100%;
    object-fit: contain; 
}

#invisible-start-btn {
    position: absolute; 
    /* Vị trí nút Enter Game tàng hình */
    bottom: 12%; 
    width: 260px; 
    height: 80px;
    background: rgba(0,0,0,0); 
    cursor: pointer; 
    border: none; 
    z-index: 10000;
}
        /* GIAO DIỆN GAME CHÍNH */
        #game-content { display: none; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* BÀN CỜ CHUẨN FILE board.png */
        #game-box { 
            position: relative; width: 88vh; height: 88vh; 
            background: white url('board.png') no-repeat center center; 
            background-size: 100% 100%; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .pawn { width: 5vh; height: 5vh; position: absolute; z-index: 100; cursor: pointer; transform: translate(-50%, -50%); transition: all 0.4s ease; }
        .pawn.active { filter: drop-shadow(0 0 15px var(--dp)); animation: bounce 0.6s infinite alternate; }
        @keyframes bounce { from { margin-top: 0; } to { margin-top: -8px; } }

        /* ĐIỀU KHIỂN GÓC VÀ UI */
        .corner-btn { position: absolute; top: 20px; width: 55px; height: 55px; background: white; border: 3px solid var(--p); border-radius: 50%; cursor: pointer; z-index: 5000; font-size: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .bottom-ui { margin-top: 15px; display: flex; align-items: center; gap: 20px; background: white; padding: 10px 40px; border-radius: 50px; border: 3px solid var(--p); }
        #dice-res { font-size: 35px; font-weight: bold; min-width: 50px; text-align: center; color: #333; }
        #roll-btn { padding: 12px 35px; background: var(--dp); color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 18px; }

        /* MODALS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .card { background: white; width: 380px; padding: 30px; border-radius: 30px; border: 6px solid var(--p); text-align: center; }
    </style>
</head>
<body>

    <div id="loading-screen">
    <img src="image_d98ded.jpg" id="loading-img">
    <button id="invisible-start-btn" onclick="enterGame()"></button>
</div>
    <div id="game-content">
        <button class="corner-btn" style="left: 20px;" onclick="openModal('settings-modal')">⚙️</button>
        <button class="corner-btn" style="right: 20px;" onclick="openModal('help-modal')">?</button>

        <div style="background: white; padding: 8px 30px; border-radius: 20px; margin-bottom: 10px; border: 3px solid var(--p); font-weight: bold; color: var(--dp);">
            Lượt: <span id="turn-display">Luca</span>
        </div>
        
        <div id="game-box"></div>

        <div class="bottom-ui">
            <div id="dice-res">🎲</div>
            <button id="roll-btn" onclick="rollDice()">ĐỔ XÚC XẮC</button>
        </div>
    </div>

    <div id="help-modal" class="modal" onclick="closeModal('help-modal')">
        <div class="card" onclick="event.stopPropagation()">
            <h2 style="color: var(--dp)">📜 HƯỚNG DẪN</h2>
            <p>Nhấn "Đổ xúc xắc", chọn quân mèo đang nhảy để đi. Về đích sớm nhất để giành chiến thắng!</p>
            <button onclick="closeModal('help-modal')" style="background: var(--dp); color: white; border: none; padding: 10px 30px; border-radius: 15px; cursor: pointer;">ĐÓNG</button>
        </div>
    </div>

    <div id="settings-modal" class="modal" onclick="closeModal('settings-modal')">
        <div class="card" onclick="event.stopPropagation()">
            <h2 style="color: var(--dp)">⚙️ THÔNG TIN</h2>
            <p>Dự án: <b>Ludo Of Facts</b></p>
            <p>Nhóm thực hiện: <b>Sang - Giang - Đan</b></p>
            <p>Lớp: 7A5</p>
            <button onclick="closeModal('settings-modal')" style="background: #eee; border: none; padding: 10px 30px; border-radius: 15px; cursor: pointer;">ĐÓNG</button>
        </div>
    </div>

    <audio id="bgMusic" loop src="pixel-drift-pecan-pie-main-version-41106-02-09.mp3"></audio>

    <script>
        let turn = 0;
        let diceValue = 0;
        const teams = ["Luca", "Meco", "Nero", "Gumo"];
        const pawnFiles = ['meo_den.png', 'meo_xiem.png', 'meo_vang.png', 'meo_trang.png'];
        
        // Tọa độ CHUỒNG được căn chỉnh theo board.png
        const homeCoords = [
            {t:[19.5,19.5,29.5,29.5], l:[19,29,19,29]}, {t:[19.5,19.5,29.5,29.5], l:[71,81,71,81]},
            {t:[70.5,70.5,80.5,80.5], l:[19,29,19,29]}, {t:[70.5,70.5,80.5,80.5], l:[71,81,71,81]}
        ];

        function enterGame() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('game-content').style.display = 'flex';
            document.getElementById('bgMusic').play().catch(() => {});
            initGame();
        }

        function initGame() {
            const box = document.getElementById('game-box');
            box.innerHTML = '';
            for(let t=0; t<4; t++) {
                for(let i=0; i<4; i++) {
                    const p = document.createElement('img');
                    p.src = pawnFiles[t];
                    p.className = 'pawn';
                    p.dataset.team = t;
                    p.style.top = homeCoords[t].t[i] + "%";
                    p.style.left = homeCoords[t].l[i] + "%";
                    p.onclick = () => movePawn(p);
                    box.appendChild(p);
                }
            }
        }

        function rollDice() {
            if(diceValue !== 0) return;
            diceValue = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-res').innerText = diceValue;
            document.querySelectorAll(`.pawn[data-team="${turn}"]`).forEach(p => p.classList.add('active'));
        }

        function movePawn(p) {
            if(parseInt(p.dataset.team) !== turn || diceValue === 0) return;
            
            // Logic di chuyển mèo ra ô khởi hành của từng màu
            const startPos = [{t:45, l:40}, {t:40, l:55}, {t:55, l:45}, {t:50, l:60}];
            p.style.top = startPos[turn].t + "%";
            p.style.left = startPos[turn].l + "%";
            
            // Chuyển lượt
            diceValue = 0;
            document.getElementById('dice-res').innerText = "🎲";
            document.querySelectorAll('.pawn').forEach(p => p.classList.remove('active'));
            turn = (turn + 1) % 4;
            document.getElementById('turn-display').innerText = teams[turn];
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
